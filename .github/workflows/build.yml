name: "构建安装包"

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: "构建 DMG"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: "解析 Swift 包依赖"
        run: |
          xcodebuild -resolvePackageDependencies \
            -project boringNotch.xcodeproj \
            -scheme boringNotch 2>&1

      - name: "构建 App（ad-hoc 签名）"
        run: |
          xcodebuild -project boringNotch.xcodeproj \
            -scheme boringNotch \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1

      - name: "打包 App"
        run: |
          APP="DerivedData/Build/Products/Release/boringNotch.app"
          if [ ! -d "$APP" ]; then
            echo "App not found at $APP"
            find DerivedData -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          mkdir -p Release
          cp -R "$APP" Release/
          echo "App size: $(du -sh Release/boringNotch.app | cut -f1)"

      - name: "安装 DMG 工具"
        run: |
          python3 -m pip install dmgbuild ds-store mac-alias 2>&1

      - name: "创建 DMG"
        run: |
          bash Configuration/dmg/create_dmg.sh \
            "$(pwd)/Release/boringNotch.app" \
            "$(pwd)/Release/boringNotch.dmg" \
            "boringNotch" 2>&1

      - name: "上传 DMG"
        uses: actions/upload-artifact@v4
        with:
          name: boringNotch.dmg
          path: Release/boringNotch.dmg

      - name: "发布 Release"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Release/boringNotch.dmg
          generate_release_notes: true
