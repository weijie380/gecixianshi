name: "构建安装包"

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（可选）'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: "构建 DMG"
    runs-on: macos-latest
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "设置版本号"
        if: github.event.inputs.version != ''
        run: |
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ github.event.inputs.version }}/g" boringNotch.xcodeproj/project.pbxproj

      - name: "解析 Swift 依赖"
        run: |
          xcodebuild -resolvePackageDependencies \
            -project boringNotch.xcodeproj \
            -scheme boringNotch

      - name: "构建 App"
        run: |
          xcodebuild build \
            -project boringNotch.xcodeproj \
            -scheme boringNotch \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: "复制 App"
        run: |
          mkdir -p Release
          cp -R "build/DerivedData/Build/Products/Release/boringNotch.app" Release/

      - name: "创建 DMG"
        run: |
          python3 -m venv /tmp/dmg-venv
          source /tmp/dmg-venv/bin/activate
          pip3 install dmgbuild ds-store mac-alias
          bash Configuration/dmg/create_dmg.sh \
            "$(pwd)/Release/boringNotch.app" \
            "$(pwd)/Release/boringNotch.dmg" \
            "boringNotch"

      - name: "上传 DMG"
        uses: actions/upload-artifact@v4
        with:
          name: boringNotch.dmg
          path: Release/boringNotch.dmg

      - name: "发布 Release"
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Release/boringNotch.dmg
          generate_release_notes: true
